<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="벤더·플랫폼 특화 옵션: Apple(Core ML·MLX), AMD(MIGraphX), 모바일·엣지(LiteRT·MNN)">
  <line x1="270" y1="10" x2="270" y2="392" class="edge-dash" stroke-width="1"/>
  <line x1="470" y1="10" x2="470" y2="392" class="edge-dash" stroke-width="1"/>

  <!-- Column 1: Apple -->
  <text x="145" y="22" text-anchor="middle" class="lbl n-purple" font-size="13.5" font-weight="700">Apple Silicon</text>

  <rect x="28" y="34" width="234" height="66" rx="8" class="t-purple s-purple" stroke-width="1.3"/>
  <text x="145" y="54" text-anchor="middle" class="lbl n-purple" font-size="12.5" font-weight="700">Core ML</text>
  <text x="145" y="70" text-anchor="middle" class="lbl-sub" font-size="9.8">iOS·macOS·watchOS·tvOS + Neural Engine</text>
  <text x="145" y="86" text-anchor="middle" class="lbl-sub" font-size="9.8">→ 프로덕션 앱 배포용</text>

  <text x="145" y="112" text-anchor="middle" class="lbl-sub" font-size="10" font-style="italic">↕ 상호보완</text>

  <rect x="28" y="120" width="234" height="66" rx="8" class="t-purple s-purple" stroke-width="1.3"/>
  <text x="145" y="140" text-anchor="middle" class="lbl n-purple" font-size="12.5" font-weight="700">MLX</text>
  <text x="145" y="156" text-anchor="middle" class="lbl-sub" font-size="9.8">macOS Apple Silicon 전용 · 모바일 배포 불가</text>
  <text x="145" y="172" text-anchor="middle" class="lbl-sub" font-size="9.8">→ 연구·파인튜닝용</text>

  <rect x="28" y="200" width="234" height="70" rx="8" class="box-neutral" stroke-width="1.2"/>
  <text x="145" y="218" text-anchor="middle" class="lbl-sub" font-size="10" font-weight="700">M5 칩 실측 (Apple 공식)</text>
  <text x="145" y="236" text-anchor="middle" class="lbl-sub" font-size="9.8">연산 바운드(TTFT): 최대 4x</text>
  <text x="145" y="252" text-anchor="middle" class="lbl-sub" font-size="9.8">메모리 바운드(토큰생성): 1.2~1.3x</text>

  <!-- Column 2: AMD -->
  <text x="370" y="22" text-anchor="middle" class="lbl n-red" font-size="13.5" font-weight="700">AMD ROCm</text>

  <rect x="288" y="34" width="164" height="96" rx="8" class="t-red s-red" stroke-width="1.3"/>
  <text x="370" y="54" text-anchor="middle" class="lbl n-red" font-size="12.5" font-weight="700">MIGraphX</text>
  <text x="370" y="72" text-anchor="middle" class="lbl-sub" font-size="9.5">ONNX/TF → AMD GPU</text>
  <text x="370" y="86" text-anchor="middle" class="lbl-sub" font-size="9.5">(MIOpen·rocBLAS)</text>
  <text x="370" y="102" text-anchor="middle" class="lbl-sub" font-size="9.5">CPU(DNNL·ZenDNN)도</text>
  <text x="370" y="116" text-anchor="middle" class="lbl-sub" font-size="9.5">지원</text>

  <text x="370" y="156" text-anchor="middle" class="lbl-sub" font-size="9.8">최신 활력 신호는</text>
  <text x="370" y="172" text-anchor="middle" class="lbl-sub" font-size="9.8">vLLM ROCm 로드맵</text>
  <text x="370" y="188" text-anchor="middle" class="lbl-sub" font-size="9.8">(3절)이 더 최신</text>

  <!-- Column 3: Mobile/Edge -->
  <text x="590" y="22" text-anchor="middle" class="lbl n-green" font-size="13.5" font-weight="700">모바일 · 엣지</text>

  <rect x="478" y="34" width="212" height="80" rx="8" class="t-green s-green" stroke-width="1.3"/>
  <text x="584" y="54" text-anchor="middle" class="lbl n-green" font-size="12" font-weight="700">LiteRT (구 TFLite)</text>
  <text x="584" y="70" text-anchor="middle" class="lbl-sub" font-size="9.5">Android · iOS · 임베디드</text>
  <text x="584" y="86" text-anchor="middle" class="lbl-sub" font-size="9.5">NPU 통합 추상화(Compiled Model API)</text>
  <text x="584" y="102" text-anchor="middle" class="lbl-sub" font-size="9.5">CUDA/ROCm 없음 — 철저히 엣지</text>

  <rect x="478" y="126" width="212" height="80" rx="8" class="t-green s-green" stroke-width="1.3"/>
  <text x="584" y="146" text-anchor="middle" class="lbl n-green" font-size="12" font-weight="700">MNN (Alibaba)</text>
  <text x="584" y="162" text-anchor="middle" class="lbl-sub" font-size="9.5">CPU/GPU(Metal·Vulkan·CUDA)</text>
  <text x="584" y="178" text-anchor="middle" class="lbl-sub" font-size="9.5">NPU(CoreML·HIAI·NNAPI·QNN)</text>
  <text x="584" y="194" text-anchor="middle" class="lbl-sub" font-size="9.5">MNN-LLM: 온디바이스 LLM 서빙</text>

  <line x1="20" y1="300" x2="700" y2="300" class="edge-dash" stroke-width="1"/>
  <text x="360" y="330" text-anchor="middle" class="lbl-sub" font-size="12" font-style="italic">세 축 모두 &quot;자기 플랫폼 안에서는 전 계층(CPU/GPU/NPU)을 다 커버&quot;하는</text>
  <text x="360" y="350" text-anchor="middle" class="lbl-sub" font-size="12" font-style="italic">방향으로 수렴하는 중이다 — 다른 벤더로의 확장이 아니라, 자기 마당을 넓히는 쪽으로.</text>
</svg>
