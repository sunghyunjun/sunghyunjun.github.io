<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PyTorch deployment path lineage: TorchScript's decline and the rise of torch.export, AOTInductor, ExecuTorch, and torch.compile">
  <defs>
    <marker id="arrow4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" class="n-gray"/>
    </marker>
  </defs>

  <!-- year gridlines -->
  <g class="lbl-sub" font-size="11">
    <line x1="100" y1="24" x2="100" y2="430" class="edge-dash" stroke-width="1"/>
    <text x="100" y="16" text-anchor="middle">2023</text>
    <line x1="280" y1="24" x2="280" y2="430" class="edge-dash" stroke-width="1"/>
    <text x="280" y="16" text-anchor="middle">2024</text>
    <line x1="460" y1="24" x2="460" y2="430" class="edge-dash" stroke-width="1"/>
    <text x="460" y="16" text-anchor="middle">2025</text>
    <line x1="620" y1="24" x2="620" y2="430" class="edge-dash" stroke-width="1"/>
    <text x="620" y="16" text-anchor="middle">2026</text>
  </g>

  <!-- Row: TorchScript (fading out) -->
  <text x="20" y="68" class="lbl" font-size="12.5" font-weight="700">TorchScript</text>
  <line x1="100" y1="80" x2="460" y2="80" class="s-gray" stroke-width="4" stroke-linecap="round"/>
  <line x1="460" y1="80" x2="560" y2="80" class="s-gray" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 6" opacity="0.55"/>
  <circle cx="280" cy="80" r="4.5" class="n-red"/>
  <text x="280" y="102" text-anchor="middle" class="lbl-sub" font-size="10">2024-02 "won't deprecate</text>
  <text x="280" y="114" text-anchor="middle" class="lbl-sub" font-size="10">without a replacement"</text>
  <circle cx="460" cy="80" r="4.5" class="n-red"/>
  <text x="460" y="102" text-anchor="middle" class="lbl-sub" font-size="10">2.10 officially</text>
  <text x="460" y="114" text-anchor="middle" class="lbl-sub" font-size="10">deprecated</text>
  <circle cx="560" cy="80" r="4.5" class="n-red"/>
  <text x="560" y="102" text-anchor="middle" class="lbl-sub" font-size="10">2.11 docs page</text>
  <text x="560" y="114" text-anchor="middle" class="lbl-sub" font-size="10">removed/redirected</text>

  <!-- Row: torch.export -->
  <text x="20" y="168" class="lbl" font-size="12.5" font-weight="700">torch.export</text>
  <line x1="280" y1="180" x2="700" y2="180" class="s-teal" stroke-width="5" stroke-linecap="round"/>
  <text x="290" y="200" class="lbl-sub" font-size="10">Official successor to trace/script · guarantees soundness</text>

  <!-- Row: AOTInductor -->
  <text x="20" y="238" class="lbl" font-size="12.5" font-weight="700">AOTInductor</text>
  <line x1="280" y1="250" x2="380" y2="250" class="s-blue" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 5" opacity="0.6"/>
  <line x1="380" y1="250" x2="700" y2="250" class="s-blue" stroke-width="5" stroke-linecap="round"/>
  <text x="290" y="270" class="lbl-sub" font-size="10">2023 prototype → server AOT deployment(.so), no device portability</text>

  <!-- Row: ExecuTorch -->
  <text x="20" y="308" class="lbl" font-size="12.5" font-weight="700">ExecuTorch</text>
  <line x1="280" y1="320" x2="460" y2="320" class="s-purple" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="460" y1="320" x2="700" y2="320" class="s-purple" stroke-width="6" stroke-linecap="round"/>
  <text x="290" y="340" class="lbl-sub" font-size="10">Embedded runtime successor → 2025~ expanded to 14 backends incl. CUDA</text>

  <!-- Row: torch.compile -->
  <text x="20" y="378" class="lbl" font-size="12.5" font-weight="700">torch.compile</text>
  <line x1="100" y1="390" x2="700" y2="390" class="s-amber" stroke-width="6" stroke-linecap="round"/>
  <text x="290" y="410" class="lbl-sub" font-size="10">2.13: MPS FlexAttention(up to 12x) · ROCm AOTriton · CuTeDSL</text>

  <text x="360" y="446" text-anchor="middle" class="lbl-sub" font-size="11.5" font-style="italic">Four paths split up what one line of TorchScript used to cover</text>
</svg>
